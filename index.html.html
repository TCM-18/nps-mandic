<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Arial,sans-serif;background:#f0f0f0;color:#1a1a1a}
#app{max-width:480px;margin:0 auto;min-height:100vh;background:#f0f0f0}
.scr{display:none}.scr.on{display:block}

/* Header */
.hdr{background:#1a1a1a;padding:16px;display:flex;align-items:center;gap:12px;position:sticky;top:0;z-index:10}
.hdr-title{font-size:16px;font-weight:600;color:#fff;flex:1}
.hdr-sub{font-size:12px;color:#aaa;margin-top:1px}
.btn-back{background:none;border:none;color:#fff;padding:4px;display:flex;align-items:center;justify-content:center;min-width:36px;min-height:36px;border-radius:8px}
.btn-back:active{background:rgba(255,255,255,.1)}

/* Body area */
.body{padding:16px;padding-bottom:100px}

/* Cards */
.card{background:#fff;border-radius:16px;padding:16px;margin-bottom:12px}
.card-sm{background:#fff;border-radius:12px;padding:14px;margin-bottom:8px}

/* Inputs */
.fg{margin-bottom:14px}
.fl{font-size:12px;color:#888;margin-bottom:6px;display:block;font-weight:500;text-transform:uppercase;letter-spacing:.4px}
input[type=text],input[type=date],textarea{width:100%;padding:13px 14px;border:1.5px solid #e5e5e5;border-radius:12px;font-size:16px;font-family:inherit;color:#1a1a1a;background:#fafafa;-webkit-appearance:none;appearance:none}
textarea{resize:none;font-size:15px}
input:focus,textarea:focus{outline:none;border-color:#1a1a1a;background:#fff}

/* Adherence grid */
.ag{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin:10px 0 8px}
.ab{padding:11px 8px;border-radius:12px;font-size:13px;font-weight:600;cursor:pointer;border:2px solid;text-align:center;min-height:46px;display:flex;align-items:center;justify-content:center;gap:5px;transition:all .12s;background:transparent}
.ab.sel{border-width:2px}
.ac{border-color:#c8e6a0;color:#27500A;background:rgba(234,243,222,.4)}
.ac.sel{background:#EAF3DE;border-color:#639922}
.an{border-color:#f5c0c0;color:#791F1F;background:rgba(252,235,235,.4)}
.an.sel{background:#FCEBEB;border-color:#E24B4A}
.ap{border-color:#f5d9aa;color:#633806;background:rgba(250,238,218,.4)}
.ap.sel{background:#FAEEDA;border-color:#BA7517}
.aa{border-color:#d5d3cc;color:#555;background:rgba(241,239,232,.4)}
.aa.sel{background:#F1EFE8;border-color:#888780}

/* Pilar header */
.ph{background:#fff;border-radius:14px;padding:14px 16px;margin-bottom:8px;cursor:pointer;display:flex;align-items:center;gap:10px;min-height:54px}
.ph:active{background:#f5f5f5}
.ph-icon{width:36px;height:36px;border-radius:10px;background:#1a1a1a;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.ph-n{font-size:14px;font-weight:600;flex:1}
.ph-t{font-size:12px;color:#888}
.ph-arr{font-size:12px;color:#bbb;margin-left:4px}

/* Progress */
.prog-wrap{background:#fff;border-radius:14px;padding:14px 16px;margin-bottom:12px}
.prog-info{display:flex;justify-content:space-between;font-size:13px;margin-bottom:8px}
.prog-pct{font-weight:700;font-size:15px}
.ptr{height:6px;background:#f0f0f0;border-radius:999px;overflow:hidden}
.pfl{height:100%;background:#1a1a1a;border-radius:999px;transition:width .3s}

/* Bottom action */
.bottom-action{position:sticky;bottom:0;left:0;right:0;background:linear-gradient(transparent,#f0f0f0 30%);padding:16px;max-width:480px;margin:0 auto}
.btn-main{width:100%;padding:16px;background:#1a1a1a;color:#fff;border:none;border-radius:16px;font-size:16px;font-weight:600;display:flex;align-items:center;justify-content:center;gap:8px;min-height:54px;font-family:inherit}
.btn-main:active{opacity:.85}
.btn-main.green{background:#27500A}
.btn-main.outline{background:#fff;color:#1a1a1a;border:1.5px solid #e5e5e5}

/* Metrics */
.metrics-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:16px}
.metric-big{grid-column:1/-1;background:#1a1a1a;border-radius:16px;padding:20px;text-align:center}
.metric-big .mv{font-size:48px;font-weight:700;color:#fff}
.metric-big .ml{font-size:13px;color:#aaa;margin-top:4px}
.mc{background:#fff;border-radius:14px;padding:14px;text-align:center}
.mv{font-size:24px;font-weight:700}.ml{font-size:11px;color:#888;margin-top:3px}

/* Pilar bar */
.psrow{background:#fff;border-radius:12px;padding:14px;margin-bottom:8px}
.pstop{display:flex;justify-content:space-between;font-size:14px;margin-bottom:8px}
.psn{font-weight:600}
.btr{height:8px;background:#f0f0f0;border-radius:999px;overflow:hidden}
.bfl{height:100%;border-radius:999px}

/* Audit list */
.ar{background:#fff;border-radius:16px;padding:16px;margin-bottom:10px;display:flex;align-items:center;justify-content:space-between;cursor:pointer}
.ar:active{background:#f5f5f5}
.ar-name{font-size:15px;font-weight:600;margin-bottom:3px}
.ar-sub{font-size:12px;color:#888}
.ar-pct{font-size:24px;font-weight:700}

/* Home header */
.home-hdr{background:#1a1a1a;padding:20px 16px 24px}
.home-brand{font-size:11px;font-weight:600;color:#aaa;letter-spacing:1px;text-transform:uppercase;margin-bottom:4px}
.home-title{font-size:22px;font-weight:700;color:#fff}

/* Chip */
.ch{display:inline-block;font-size:11px;font-weight:600;padding:4px 10px;border-radius:999px;white-space:nowrap}
.cc{background:#EAF3DE;color:#27500A}.cn{background:#FCEBEB;color:#791F1F}
.cp{background:#FAEEDA;color:#633806}.ca{background:#F1EFE8;color:#444441}
.cs{background:#f0f0f0;color:#666}

/* Dica */
.db{background:none;border:none;font-size:13px;color:#888;cursor:pointer;padding:0 0 6px;display:flex;align-items:center;gap:4px;font-family:inherit}
.dc{display:none;font-size:13px;color:#666;background:#f5f5f3;padding:12px;border-radius:10px;white-space:pre-line;margin-bottom:8px;line-height:1.6}

/* Photo */
.foto-btn{background:#f5f5f5;border:1.5px dashed #ccc;border-radius:12px;padding:10px 14px;font-size:13px;color:#666;display:inline-flex;align-items:center;gap:6px;margin-top:8px;font-family:inherit;cursor:pointer;min-height:42px}
.foto-btn:active{background:#ebebeb}
.foto-area{margin-top:4px}
.foto-thumb-wrap{position:relative;display:inline-block;margin:6px 6px 0 0}
.foto-thumb-wrap img{width:80px;height:80px;object-fit:cover;border-radius:10px;display:block}
.foto-del{position:absolute;top:-6px;right:-6px;background:#E24B4A;color:#fff;border:none;border-radius:50%;width:22px;height:22px;font-size:13px;cursor:pointer;display:flex;align-items:center;justify-content:center;font-weight:700}

/* Empty */
.emp{text-align:center;padding:48px 16px;color:#aaa;font-size:14px}

/* Section label */
.sec-lbl{font-size:11px;font-weight:600;color:#aaa;letter-spacing:.6px;text-transform:uppercase;padding:0 4px;margin:16px 0 8px}

/* Divider detail */
.det-item{padding:12px 0;border-bottom:.5px solid #f0f0f0;display:flex;align-items:flex-start;gap:10px}

/* FAB */
.fab{position:sticky;bottom:20px;display:flex;justify-content:flex-end;padding:0 4px;pointer-events:none}
.fab button{pointer-events:all;width:56px;height:56px;border-radius:999px;background:#1a1a1a;color:#fff;border:none;font-size:28px;display:flex;align-items:center;justify-content:center;box-shadow:0 4px 12px rgba(0,0,0,.25)}

@media print{
  *{-webkit-print-color-adjust:exact;print-color-adjust:exact}
  #app{display:none !important}
  #pr{display:block !important}
  #pr{font-family:Arial,sans-serif;color:#111;font-size:11px}
  .pr-header{padding:16px 20px 12px;border-bottom:2px solid #333}
  .pr-header h1{font-size:17px;font-weight:700;margin-bottom:6px}
  .pr-header p{font-size:11px;color:#555;margin:2px 0}
  .pr-metrics{display:flex;gap:8px;padding:12px 20px;background:#f8f8f8;border-bottom:1px solid #ddd;flex-wrap:wrap}
  .pr-mc{min-width:75px;text-align:center;padding:6px 10px;background:#fff;border:1px solid #ddd;border-radius:4px}
  .pr-mv{font-size:17px;font-weight:700}.pr-ml{font-size:9px;color:#666;margin-top:1px}
  .pr-pilars{padding:12px 20px}
  .pr-pilar{margin-bottom:16px;page-break-inside:avoid}
  .pr-pt{font-size:12px;font-weight:700;text-transform:uppercase;padding:5px 8px;background:#f0f0f0;border-left:3px solid #333;margin-bottom:6px}
  .pr-table{width:100%;border-collapse:collapse}
  .pr-table th{background:#f5f5f5;padding:5px 7px;text-align:left;font-size:9px;border:1px solid #ccc;font-weight:600}
  .pr-table td{padding:5px 7px;border:1px solid #ddd;font-size:10px;vertical-align:top}
  .pr-table tr:nth-child(even) td{background:#fafafa}
  .pr-fotos{display:flex;flex-wrap:wrap;gap:4px;margin-top:4px}
  .pr-fotos img{width:60px;height:60px;object-fit:cover;border-radius:3px;border:1px solid #ddd}
  .pr-foot{padding:10px 20px;border-top:1px solid #ddd;font-size:9px;color:#999;text-align:center}
  .pr-stats{font-size:10px;color:#555;margin-bottom:6px}
}
#pr{display:none}
</style>

function fD(d){if(!d)return'';var p=d.split('-');return p[2]+'/'+p[1]+'/'+p[0]}
function adLbl(v){return v==='CONFORME'?'Conforme':v==='NAO'?'Não conforme':v==='PARCIAL'?'Atende parcial':v==='NA'?'N/A':'—'}
function pC(v){return v>=80?'#27500A':v>=50?'#633806':'#791F1F'}
function pB(v){return v>=80?'#639922':v>=50?'#BA7517':'#E24B4A'}

function calcS(a){
  var c=0,n=0,p=0,na=0;
  IT.forEach(function(it){var r=a.respostas[it.id];if(!r||!r.ad)return;if(r.ad==='CONFORME')c++;else if(r.ad==='NAO')n++;else if(r.ad==='PARCIAL')p++;else if(r.ad==='NA')na++;});
  var av=c+n+p,pts=c+p*.5;
  return{c:c,n:n,p:p,na:na,tot:IT.length,resp:c+n+p+na,av:av,pct:av>0?Math.round(pts/av*100):0};
}
function calcPS(a,pilar){
  var its=IT.filter(function(i){return i.p===pilar});
  var c=0,n=0,p=0,na=0;
  its.forEach(function(it){var r=a.respostas[it.id];if(!r||!r.ad)return;if(r.ad==='CONFORME')c++;else if(r.ad==='NAO')n++;else if(r.ad==='PARCIAL')p++;else if(r.ad==='NA')na++;});
  var av=c+n+p,pts=c+p*.5;
  return{c:c,n:n,p:p,na:na,tot:its.length,av:av,pct:av>0?Math.round(pts/av*100):0};
}

function loadData(){store.get('pgmed-v2').then(function(r){if(r)try{audits=JSON.parse(r.value);}catch(e){}render();});}
function sv(){store.set('pgmed-v2',JSON.stringify(audits));}

function updProg(){
  var a=gA();if(!a)return;
  var r=IT.filter(function(i){return a.respostas[i.id]&&a.respostas[i.id].ad}).length;
  var pct=Math.round(r/IT.length*100);
  var pfl=document.getElementById('pfl'),pinf=document.getElementById('pinf'),ppct=document.getElementById('ppct');
  if(pfl)pfl.style.width=pct+'%';
  if(pinf)pinf.textContent=r+' de '+IT.length+' respondidos';
  if(ppct)ppct.textContent=pct+'%';
  getPil().forEach(function(pl,idx){
    var pits=IT.filter(function(i){return i.p===pl});
    var pr=pits.filter(function(i){return a.respostas[i.id]&&a.respostas[i.id].ad}).length;
    var el=document.getElementById('ptag'+idx);
    if(el)el.textContent=pr+'/'+pits.length;
  });
}

function render(){
  document.querySelectorAll('.scr').forEach(function(s){s.classList.remove('on');s.innerHTML='';});
  var mp={home:'sh',setup:'ss',audit:'sa',summary:'sm'};
  var el=document.getElementById(mp[scr]);
  if(!el)return;
  el.classList.add('on');
  if(scr==='home')el.innerHTML=rHome();
  else if(scr==='setup')el.innerHTML=rSetup();
  else if(scr==='audit')el.innerHTML=rAudit();
  else if(scr==='summary')el.innerHTML=rSum();
}

function rHome(){
  var sorted=audits.slice().sort(function(a,b){return b.dat.localeCompare(a.dat)});
  var list='';
  if(!sorted.length){
    list='<div class="emp" style="padding:60px 16px"><div style="font-size:40px;margin-bottom:12px">📋</div><div>Nenhuma auditoria ainda.<br>Toque em + para começar.</div></div>';
  } else {
    list='<div class="sec-lbl">Auditorias</div>';
    sorted.forEach(function(a){
      var s=calcS(a);
      var right=a.done
        ?'<div><div class="ar-pct" style="color:'+pC(s.pct)+'">'+s.pct+'%</div><div style="font-size:11px;color:#aaa">conformidade</div></div>'
        :'<div style="text-align:right"><span class="ch cs">andamento</span><div style="font-size:11px;color:#aaa;margin-top:4px">'+s.resp+'/'+IT.length+'</div></div>';
      list+='<div class="ar" onclick="openA(\''+a.id+'\')"><div><div class="ar-name">'+a.uni+'</div><div class="ar-sub">'+a.aud+(a.cargo?' · '+a.cargo:'')+' · '+fD(a.dat)+'</div></div>'+right+'</div>';
    });
  }
  return '<div class="home-hdr"><div class="home-brand">PG MED</div><div class="home-title">Score Operacional</div></div>'
    +'<div class="body">'+list+'</div>'
    +'<div class="fab"><button onclick="scr=\'setup\';render()" aria-label="Nova auditoria">+</button></div>';
}

function rSetup(){
  var td=new Date().toISOString().split('T')[0];
  return '<div class="hdr"><button class="btn-back" onclick="scr=\'home\';render()">&#8592;</button><div><div class="hdr-title">Nova auditoria</div><div class="hdr-sub">'+IT.length+' itens · 9 pilares</div></div></div>'
    +'<div class="body">'
    +'<div class="card">'
    +'<div class="fg"><label class="fl">Nome completo</label><input id="iA" type="text" placeholder="Nome completo do auditor" autocomplete="name"></div>'
    +'<div class="fg"><label class="fl">Cargo</label><input id="iC" type="text" placeholder="Ex: Analista de Processos"></div>'
    +'<div class="fg"><label class="fl">Unidade</label><input id="iU" type="text" placeholder="Nome da unidade auditada"></div>'
    +'<div class="fg" style="margin-bottom:0"><label class="fl">Data da visita</label><input id="iD" type="date" value="'+td+'"></div>'
    +'</div></div>'
    +'<div class="bottom-action"><button class="btn-main" onclick="startA()">&#9654; Iniciar Score Operacional</button></div>';
}

function fotosHtml(itemId,fotos){
  if(!fotos||!fotos.length)return'';
  return fotos.map(function(f,i){
    return '<div class="foto-thumb-wrap"><img src="'+f+'" alt="foto '+(i+1)+'"><button class="foto-del" onclick="removeFoto(\''+itemId+'\','+i+')" title="Remover">×</button></div>';
  }).join('');
}

function pilIcon(pl){
  var icons={'Atendimento':'👥','Clínica':'🏥','Educacional':'🎓','Estrutura':'🏢','Infra (Tech)':'💻','G&G':'🤝','Reg. / Biossegurança':'🛡️','Liderança':'📊','Exp. do Aluno':'⭐'};
  return icons[pl]||'📋';
}

function rAudit(){
  var a=gA();if(!a)return'';
  var rCnt=IT.filter(function(i){return a.respostas[i.id]&&a.respostas[i.id].ad}).length;
  var pct=Math.round(rCnt/IT.length*100);
  var h='<div class="hdr"><button class="btn-back" onclick="if(confirm(\'Sair? O progresso foi salvo.\'))goHome()">&#8592;</button><div><div class="hdr-title">'+a.uni+'</div><div class="hdr-sub">'+a.aud+(a.cargo?' · '+a.cargo:'')+'</div></div></div>'
    +'<div class="body">'
    +'<div class="prog-wrap"><div class="prog-info"><span id="pinf" style="font-size:13px;color:#888">'+rCnt+' de '+IT.length+' respondidos</span><span class="prog-pct" id="ppct">'+pct+'%</span></div><div class="ptr"><div class="pfl" id="pfl" style="width:'+pct+'%"></div></div></div>';

  getPil().forEach(function(pl,idx){
    var pits=IT.filter(function(i){return i.p===pl});
    var prsp=pits.filter(function(i){return a.respostas[i.id]&&a.respostas[i.id].ad}).length;
    var pid='pb'+idx;
    h+='<div class="ph" onclick="tgPil(\''+pid+'\','+idx+')">'
      +'<div class="ph-icon"><span style="font-size:18px">'+pilIcon(pl)+'</span></div>'
      +'<div><div class="ph-n">'+pl+'</div></div>'
      +'<span class="ph-t" id="ptag'+idx+'">'+prsp+'/'+pits.length+'</span>'
      +'<span class="ph-arr" id="ici'+idx+'">▼</span>'
      +'</div><div id="'+pid+'">';
    pits.forEach(function(it){
      var r=a.respostas[it.id]||{};
      var hd=DK[it.id]&&DK[it.id].length>0;
      var fotos=r.fotos||[];
      h+='<div class="card-sm">'
        +'<div style="font-size:15px;font-weight:600;line-height:1.45;margin-bottom:8px;color:#1a1a1a">'+it.q+'</div>'
        +(hd?'<button class="db" onclick="tgDk(\''+it.id+'\')">💡 Ver dica do auditor</button><div class="dc" id="dk'+it.id+'"></div>':'')
        +'<div class="ag" id="ag'+it.id+'">'
        +'<button class="ab ac'+(r.ad==='CONFORME'?' sel':'')+'" onclick="setAd(\''+it.id+'\',\'CONFORME\',this)">✓ Conforme</button>'
        +'<button class="ab an'+(r.ad==='NAO'?' sel':'')+'" onclick="setAd(\''+it.id+'\',\'NAO\',this)">✗ Não conforme</button>'
        +'<button class="ab ap'+(r.ad==='PARCIAL'?' sel':'')+'" onclick="setAd(\''+it.id+'\',\'PARCIAL\',this)">~ Atende parcial</button>'
        +'<button class="ab aa'+(r.ad==='NA'?' sel':'')+'" onclick="setAd(\''+it.id+'\',\'NA\',this)">— N/A</button>'
        +'</div>'
        +'<textarea placeholder="Observações (opcional)..." style="height:64px;margin-top:4px" onblur="setOb(\''+it.id+'\',this.value)">'+(r.obs||'')+'</textarea>'
        +'<div class="foto-area">'
        +'<div id="ft'+it.id+'">'+fotosHtml(it.id,fotos)+'</div>'
        +(fotos.length<3
          ?'<input type="file" accept="image/*" id="fi'+it.id+'" style="display:none" onchange="addFoto(\''+it.id+'\',this)">'
          +'<button class="foto-btn" onclick="document.getElementById(\'fi'+it.id+'\').click()">📷 Adicionar foto</button>'
          :'<span style="font-size:12px;color:#aaa">Máx. 3 fotos</span>')
        +'</div></div>';
    });
    h+='</div>';
  });
  h+='</div><div class="bottom-action"><button class="btn-main green" onclick="finA()">✓ Finalizar auditoria</button></div>';
  return h;
}

function rSum(){
  var a=gA();if(!a)return'';
  var s=calcS(a);
  var h='<div class="hdr"><button class="btn-back" onclick="goHome()">&#8592;</button><div><div class="hdr-title">Resultado</div><div class="hdr-sub">'+a.uni+' · '+fD(a.dat)+'</div></div><button onclick="printS()" style="background:none;border:none;color:#fff;font-size:22px;cursor:pointer;padding:4px;min-width:36px" title="Exportar PDF">📄</button></div>'
    +'<div class="body">'
    +'<div class="metrics-grid">'
    +'<div class="metric-big"><div class="mv">'+s.pct+'%</div><div class="ml">Conformidade geral</div></div>'
    +'<div class="mc"><div class="mv" style="color:#27500A">'+s.c+'</div><div class="ml">Conformes</div></div>'
    +'<div class="mc"><div class="mv" style="color:#791F1F">'+s.n+'</div><div class="ml">Não conformes</div></div>'
    +'<div class="mc"><div class="mv" style="color:#633806">'+s.p+'</div><div class="ml">Parciais</div></div>'
    +'<div class="mc"><div class="mv">'+s.na+'</div><div class="ml">N/A</div></div>'
    +'</div>'
    +'<div class="sec-lbl">Por pilar</div>';

  getPil().forEach(function(pl){
    var ps=calcPS(a,pl);
    h+='<div class="psrow"><div class="pstop"><span class="psn">'+pilIcon(pl)+' '+pl+'</span>'
      +'<span style="color:'+pC(ps.pct)+';font-weight:700">'+(ps.av>0?ps.pct+'%':'—')+'</span></div>'
      +'<div class="btr"><div class="bfl" style="width:'+ps.pct+'%;background:'+pB(ps.pct)+'"></div></div>'
      +'<div style="font-size:11px;color:#aaa;margin-top:5px">'+ps.c+' conformes · '+ps.n+' não conf. · '+ps.p+' parciais · '+ps.na+' N/A</div>'
      +'</div>';
  });

  h+='<div class="sec-lbl">Detalhamento</div>';
  getPil().forEach(function(pl){
    var pits=IT.filter(function(i){return i.p===pl});
    h+='<div style="font-size:12px;font-weight:600;color:#aaa;text-transform:uppercase;letter-spacing:.5px;padding:12px 4px 6px">'+pl+'</div>';
    pits.forEach(function(it){
      var r=a.respostas[it.id]||{};
      var ad=r.ad||'';
      var cls=ad==='CONFORME'?'cc':ad==='NAO'?'cn':ad==='PARCIAL'?'cp':ad==='NA'?'ca':'cs';
      var fotos=r.fotos||[];
      h+='<div class="card-sm" style="margin-bottom:8px">'
        +'<div style="display:flex;align-items:flex-start;gap:8px;margin-bottom:'+(r.obs||fotos.length?'8px':'0')+'">'
        +'<span class="ch '+cls+'" style="flex-shrink:0;margin-top:1px">'+adLbl(ad)+'</span>'
        +'<span style="font-size:13px;line-height:1.4">'+it.q+'</span>'
        +'</div>'
        +(r.obs?'<div style="font-size:13px;color:#666;padding:8px;background:#f8f8f8;border-radius:8px;margin-bottom:6px">'+r.obs+'</div>':'')
        +(fotos.length?'<div style="display:flex;flex-wrap:wrap;gap:6px">'+fotos.map(function(f){return'<img src="'+f+'" style="width:72px;height:72px;object-fit:cover;border-radius:8px">';}).join('')+'</div>':'')
        +'</div>';
    });
  });

  if(!a.done){
    h+='<button class="btn-main outline" onclick="scr=\'audit\';render()" style="margin-bottom:10px">✏️ Continuar preenchendo</button>';
  }
  h+='<button class="btn-main" onclick="printS()" style="margin-bottom:10px">📄 Exportar PDF</button>'
    +'<button class="btn-main outline" style="color:#791F1F;border-color:#f5c0c0" onclick="if(confirm(\'Excluir esta auditoria?\'))delA()">🗑 Excluir auditoria</button>'
    +'</div>';

  if(!a.done){h+='<div class="bottom-action"><button class="btn-main green" onclick="finA()">✓ Concluir auditoria</button></div>';}
  return h;
}

function goHome(){scr='home';render();}
function openA(id){curId=id;var a=audits.find(function(x){return x.id===id});scr=a.done?'summary':'audit';render();}
function startA(){
  var au=document.getElementById('iA').value.trim();
  var ca=document.getElementById('iC').value.trim();
  var un=document.getElementById('iU').value.trim();
  var dt=document.getElementById('iD').value;
  if(!au||!un){alert('Preencha o nome completo e a unidade.');return;}
  var a={id:uid(),aud:au,cargo:ca,uni:un,dat:dt,done:false,respostas:{}};
  audits.push(a);curId=a.id;sv();scr='audit';render();
}
function tgDk(id){
  var el=document.getElementById('dk'+id);if(!el)return;
  if(!el.textContent)el.textContent=DK[id]||'';
  el.style.display=el.style.display==='block'?'none':'block';
}
function tgPil(pid,idx){
  var body=document.getElementById(pid);var icon=document.getElementById('ici'+idx);if(!body)return;
  var open=body.style.display!=='none';
  body.style.display=open?'none':'block';
  if(icon)icon.textContent=open?'▶':'▼';
}
function setAd(itemId,value,btn){
  var a=gA();if(!a)return;
  if(!a.respostas[itemId])a.respostas[itemId]={};
  a.respostas[itemId].ad=value;
  var grp=document.getElementById('ag'+itemId);
  if(grp)grp.querySelectorAll('.ab').forEach(function(b){b.classList.toggle('sel',b===btn);});
  updProg();sv();
}
function setOb(itemId,value){
  var a=gA();if(!a)return;
  if(!a.respostas[itemId])a.respostas[itemId]={};
  a.respostas[itemId].obs=value;sv();
}
function addFoto(itemId,input){
  var file=input.files[0];if(!file)return;
  var a=gA();if(!a)return;
  if(!a.respostas[itemId])a.respostas[itemId]={};
  var fotos=a.respostas[itemId].fotos||[];
  if(fotos.length>=3){alert('Máximo de 3 fotos por item.');return;}
  var reader=new FileReader();
  reader.onload=function(e){
    var img=new Image();
    img.onload=function(){
      var MAX=600,q=0.65,w=img.width,h=img.height;
      if(w>MAX||h>MAX){if(w>h){h=Math.round(h*MAX/w);w=MAX;}else{w=Math.round(w*MAX/h);h=MAX;}}
      var cv=document.createElement('canvas');cv.width=w;cv.height=h;
      cv.getContext('2d').drawImage(img,0,0,w,h);
      var data=cv.toDataURL('image/jpeg',q);
      a.respostas[itemId].fotos=fotos.concat([data]);sv();
      var ft=document.getElementById('ft'+itemId);
      if(ft)ft.innerHTML=fotosHtml(itemId,a.respostas[itemId].fotos);
      input.value='';
    };
    img.src=e.target.result;
  };
  reader.readAsDataURL(file);
}
function removeFoto(itemId,idx){
  var a=gA();if(!a)return;
  if(!a.respostas[itemId]||!a.respostas[itemId].fotos)return;
  a.respostas[itemId].fotos.splice(idx,1);sv();
  var ft=document.getElementById('ft'+itemId);
  if(ft)ft.innerHTML=fotosHtml(itemId,a.respostas[itemId].fotos);
}
function finA(){
  var a=gA();if(!a)return;
  var s=calcS(a);var missing=IT.length-s.resp;
  if(missing>0&&!confirm('Há '+missing+' item(ns) sem resposta. Finalizar mesmo assim?'))return;
  a.done=true;sv();scr='summary';render();
  setTimeout(function(){if(confirm('Auditoria concluída! Exportar PDF agora?'))printS();},300);
}
function delA(){audits=audits.filter(function(a){return a.id!==curId;});sv();goHome();}
function printS(){
  var a=gA();if(!a)return;
  var s=calcS(a);var now=new Date().toLocaleDateString('pt-BR');
  var pilTbls='';
  getPil().forEach(function(pl){
    var ps=calcPS(a,pl);var rows='';var num=0;
    IT.filter(function(i){return i.p===pl}).forEach(function(it){
      num++;var r=a.respostas[it.id]||{};
      var bg=r.ad==='CONFORME'?'#f0fbe8':r.ad==='NAO'?'#fff0f0':r.ad==='PARCIAL'?'#fffbf0':'';
      var fc=(r.fotos&&r.fotos.length)?'<div class="pr-fotos">'+r.fotos.map(function(f){return'<img src="'+f+'">';}).join('')+'</div>':'';
      rows+='<tr style="background:'+bg+'"><td style="color:#888;width:22px;text-align:center">'+num+'</td><td>'+it.q+'</td><td style="text-align:center;font-weight:600">'+adLbl(r.ad||'')+'</td><td>'+(r.obs||'')+fc+'</td></tr>';
    });
    pilTbls+='<div class="pr-pilar"><div class="pr-pt">'+pl+'</div><div class="pr-stats">'+ps.tot+' itens · <b>'+(ps.av>0?ps.pct+'%':'—')+'</b> conformidade · '+ps.c+' conf · '+ps.n+' nc · '+ps.p+' parc · '+ps.na+' N/A</div><table class="pr-table"><thead><tr><th>#</th><th>Prática auditada</th><th>Aderência</th><th>Observações e fotos</th></tr></thead><tbody>'+rows+'</tbody></table></div>';
  });
  document.getElementById('pr').innerHTML=
    '<div class="pr-header"><h1>Score Operacional — PG MED</h1><p><b>Unidade:</b> '+a.uni+'</p><p><b>Auditor:</b> '+a.aud+(a.cargo?' · '+a.cargo:'')+'</p><p><b>Data da visita:</b> '+fD(a.dat)+'&emsp;<b>Gerado em:</b> '+now+'</p></div>'
    +'<div class="pr-metrics"><div class="pr-mc"><div class="pr-mv" style="color:'+pC(s.pct)+'">'+s.pct+'%</div><div class="pr-ml">Conformidade geral</div></div><div class="pr-mc"><div class="pr-mv" style="color:green">'+s.c+'</div><div class="pr-ml">Conformes</div></div><div class="pr-mc"><div class="pr-mv" style="color:red">'+s.n+'</div><div class="pr-ml">Não conformes</div></div><div class="pr-mc"><div class="pr-mv" style="color:orange">'+s.p+'</div><div class="pr-ml">Parciais</div></div><div class="pr-mc"><div class="pr-mv">'+s.na+'</div><div class="pr-ml">N/A</div></div><div class="pr-mc"><div class="pr-mv" style="color:#aaa">'+(s.tot-s.resp)+'</div><div class="pr-ml">Sem resposta</div></div></div>'
    +'<div class="pr-pilars">'+pilTbls+'</div><div class="pr-foot">Score Operacional PG MED · '+IT.length+' práticas · '+getPil().length+' pilares</div>';
  window.print();
}
var SENHA='pgmed2025';

function checkPw(){
  var v=document.getElementById('pwInput').value;
  var err=document.getElementById('pwErr');
  if(v===SENHA){
    document.getElementById('lock').style.display='none';
    document.getElementById('app').style.display='block';
    loadData();
  } else {
    err.style.display='block';
    document.getElementById('pwInput').value='';
    document.getElementById('pwInput').focus();
  }
}

// Auto-foco no campo de senha
document.getElementById('pwInput').focus();
</script>
